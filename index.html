<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#070709" />
  <title>Prospera — Finanças Pessoais</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=21" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23070709'/><text x='50' y='72' font-size='62' font-family='Arial,sans-serif' font-weight='700' text-anchor='middle' fill='%23ff3b46'>₽</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Prospera — controle suas finanças pessoais com orçamentos, metas, dívidas e insights feitos para a sua realidade. Funciona offline." />
</head>
<body>
  <!-- ambient cinematic backdrop -->
  <div class="fx-aurora" aria-hidden="true"><i class="a1"></i><i class="a2"></i><i class="a3"></i></div>

  <!-- ===================== AUTH ===================== -->
  <div id="auth" class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="brand">
        <div class="brand-logo">₽</div>
        <div>
          <h1>Prospera</h1>
          <p class="brand-tag">Sua vida financeira, organizada.</p>
        </div>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Entrar</button>
        <button class="auth-tab" data-tab="register">Criar conta</button>
      </div>

      <!-- Login -->
      <form id="loginForm" class="auth-form">
        <label>E-mail
          <input type="email" name="email" autocomplete="username" required placeholder="voce@email.com" />
        </label>
        <label>Senha
          <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••" />
        </label>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <!-- Register -->
      <form id="registerForm" class="auth-form hidden">
        <label>Nome
          <input type="text" name="name" autocomplete="name" required placeholder="Seu nome" />
        </label>
        <label>E-mail
          <input type="email" name="email" autocomplete="username" required placeholder="voce@email.com" />
        </label>
        <label>Senha
          <input type="password" name="password" autocomplete="new-password" required minlength="6" placeholder="Mínimo 6 caracteres" />
        </label>
        <label>Renda mensal aproximada (R$) <span class="hint">opcional — ajuda nas análises</span>
          <input type="number" name="income" step="0.01" min="0" placeholder="0,00" />
        </label>
        <label>Código de convite
          <input type="text" name="invite" autocomplete="off" required placeholder="PRSP-XXXX-XXXX" style="text-transform:uppercase" />
        </label>
        <div class="auth-error" id="registerError"></div>
        <button type="submit" class="btn btn-primary btn-block">Criar minha conta</button>
      </form>

      <p class="auth-note"><svg class="ic-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="5" y="10.5" width="14" height="9.5" rx="2.2"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg> Sua conta sincroniza com segurança na nuvem — entre de qualquer navegador ou celular. Os dados ficam protegidos e acessíveis só para você.</p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo sm">₽</div>
        <span>Prospera</span>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard" data-icon="dashboard"><span class="ic"></span> Painel</button>
        <button class="nav-item" data-view="transactions" data-icon="transactions"><span class="ic"></span> Lançamentos</button>
        <button class="nav-item" data-view="planejar" data-icon="calendar"><span class="ic"></span> Planejar</button>
        <button class="nav-item" data-view="orcamento" data-icon="scale"><span class="ic"></span> Orçamento</button>
        <button class="nav-item" data-view="bancos" data-icon="bank"><span class="ic"></span> Bancos</button>
        <button class="nav-item" data-view="debts" data-icon="debt"><span class="ic"></span> Dívidas</button>
        <button class="nav-item" data-view="goals" data-icon="target"><span class="ic"></span> Metas</button>
        <button class="nav-item" data-view="patrimonio" data-icon="layers"><span class="ic"></span> Patrimônio</button>
        <button class="nav-item" data-view="insights" data-icon="spark"><span class="ic"></span> Insights</button>
        <button class="nav-item" data-view="consultor" data-icon="chat"><span class="ic"></span> Consultor</button>
        <button class="nav-item" data-view="reports" data-icon="bars"><span class="ic"></span> Relatórios</button>
        <button class="nav-item" data-view="settings" data-icon="gear"><span class="ic"></span> Ajustes</button>
      </nav>
      <div class="sidebar-foot">
        <div class="user-chip">
          <div class="avatar" id="userAvatar">U</div>
          <div class="user-meta">
            <strong id="userName">Usuário</strong>
            <small id="userEmail">email</small>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm btn-block" id="logoutBtn">Sair</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu"></button>
        <div class="month-picker">
          <button class="icon-btn" id="prevMonth" aria-label="Mês anterior">‹</button>
          <strong id="currentMonthLabel">—</strong>
          <button class="icon-btn" id="nextMonth" aria-label="Próximo mês">›</button>
        </div>
        <button class="icon-btn" id="themeBtn" aria-label="Alternar tema"></button>
        <button class="btn btn-primary btn-sm" id="quickAddBtn">+ Lançamento</button>
      </header>

      <div class="view-wrap" id="viewWrap"></div>
    </main>
  </div>

  <!-- ===================== MODAL ===================== -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/config.js?v=21"></script>
  <script src="js/icons.js?v=21"></script>
  <script src="js/cloud.js?v=21"></script>
  <script src="js/store.js?v=21"></script>
  <script src="js/auth.js?v=21"></script>
  <script src="js/charts.js?v=21"></script>
  <script src="js/insights.js?v=21"></script>
  <script src="js/finance.js?v=21"></script>
  <script src="js/bank.js?v=21"></script>
  <script src="js/advisor.js?v=21"></script>
  <script src="js/reports.js?v=21"></script>
  <script src="js/app.js?v=21"></script>
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
